name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 2.2.0)'
        required: false
        default: ''

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Sync Capacitor
      run: npx cap sync ios

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15'

    - name: Install CocoaPods
      run: gem install cocoapods

    - name: Install Pods
      working-directory: ios/App
      run: pod install

    - name: Build IPA (unsigned)
      run: |
        cd ios/App
        xcodebuild -workspace App.xcworkspace \
          -scheme App \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          ENABLE_BITCODE=NO \
          ONLY_ACTIVE_ARCH=NO

    - name: Create IPA
      run: |
        mkdir -p build/ipa/Payload
        cp -r ios/App/build/Build/Products/Release-iphoneos/App.app build/ipa/Payload/
        cd build/ipa
        zip -r "../../puzzle-master-v2.2-unsigned.ipa" Payload/

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: puzzle-master-ios-unsigned
        path: puzzle-master-v2.2-unsigned.ipa
<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>生成图标</title></head><body>
<h2>图标生成器</h2>
<p>点击按钮生成图标，然后右键保存到 icons/ 目录</p>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas, size) {
    const ctx = canvas.getContext('2d');
    // 背景渐变
    const grad = ctx.createLinearGradient(0, 0, size, size);
    grad.addColorStop(0, '#6c5ce7');
    grad.addColorStop(1, '#fd79a8');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, size, size);
    // 圆角
    const r = size * 0.15;
    ctx.globalCompositeOperation = 'destination-in';
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(size - r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size - r);
    ctx.quadraticCurveTo(size, size, size - r, size);
    ctx.lineTo(r, size);
    ctx.quadraticCurveTo(0, size, 0, size - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
    // 拼图emoji
    ctx.font = `${size * 0.5}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🧩', size / 2, size / 2);
    // 下载
    const link = document.createElement('a');
    link.download = `icon-${size}.png`;
    link.href = canvas.toDataURL('image/png');
    link.textContent = `下载 ${size}x${size}`;
    document.body.appendChild(link);
    document.body.appendChild(document.createElement('br'));
}
drawIcon(document.getElementById('c192'), 192);
drawIcon(document.getElementById('c512'), 512);
</script>
</body></html>
